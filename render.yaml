services:
  - type: web
    name: cryptohunt-api
    runtime: python
    repo: https://github.com/AtmanTest/cryptohunt
    branch: main
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn main:app --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --workers 4 --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
    domains:
      - cryptohunt.onrender.com
